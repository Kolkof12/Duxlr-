<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duxlr | تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0e14; color: white; }
        .login-box { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="login-box w-full max-w-md p-8 rounded-3xl shadow-2xl">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black tracking-tighter mb-2">
                <span class="text-blue-500">DUX</span>LR
            </h1>
            <p class="text-gray-500 text-sm italic">بوابتك الآمنة لتداول العملات</p>
        </div>

        <form action="index.html" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-gray-400 mb-2 uppercase">البريد الإلكتروني</label>
                <input type="email" required placeholder="admin@duxlr.pro" class="w-full bg-black/50 border border-gray-800 rounded-xl p-4 outline-none focus:border-blue-500 transition-all">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-400 mb-2 uppercase">كلمة المرور</label>
                <input type="password" required placeholder="••••••••" class="w-full bg-black/50 border border-gray-800 rounded-xl p-4 outline-none focus:border-blue-500 transition-all">
            </div>
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-500/20 transition-all active:scale-95">
                دخول إلى المنصة
            </button>
        </form>

        <div class="mt-8 text-center text-xs text-gray-600">
            &copy; 2026 Duxlr Financial Systems. All rights reserved.
        </div>
    </div>
</body>
</html>
