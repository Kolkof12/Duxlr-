<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Finance | محاكي التحويل المالي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-text {
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .neon-border {
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.4);
        }
    </style>
</head>
<body class="bg-[#0b0e14] text-gray-200 font-sans min-h-screen">

    <nav class="p-6 border-b border-gray-800 flex justify-between items-center">
        <h1 class="text-2xl font-bold gradient-text tracking-wider">AEGIS <span class="text-white text-sm font-light italic">FINANCE</span></h1>
        <div class="flex items-center gap-4">
            <span id="status" class="text-xs bg-green-500/20 text-green-400 px-3 py-1 rounded-full border border-green-500/30">متصل (محاكاة)</span>
            <i class="fas fa-user-circle text-2xl text-gray-400"></i>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1 space-y-6">
            <div class="relative h-56 w-full rounded-2xl bg-gradient-to-br from-blue-600 to-indigo-900 p-6 overflow-hidden neon-border shadow-2xl">
                <div class="absolute top-0 right-0 p-4 opacity-20"><i class="fas fa-wifi fa-2xl rotate-90"></i></div>
                <div class="flex justify-between items-start mb-12">
                    <span class="font-medium tracking-widest text-lg uppercase">Virtual Card</span>
                    <i class="fab fa-cc-visa text-4xl"></i>
                </div>
                <div class="text-2xl font-mono tracking-widest mb-4">**** **** **** 8842</div>
                <div class="flex justify-between items-end">
                    <div>
                        <p class="text-[10px] uppercase opacity-60">Card Holder</p>
                        <p class="text-sm font-semibold tracking-wide">B. YASSER</p>
                    </div>
                    <div>
                        <p class="text-[10px] uppercase opacity-60">Expiry</p>
                        <p class="text-sm font-semibold">12/28</p>
                    </div>
                </div>
            </div>

            <div class="glass-card rounded-2xl p-6 space-y-4">
                <div class="flex justify-between items-center">
                    <span class="text-gray-400">رصيد الدولار</span>
                    <span id="usd-balance" class="text-xl font-bold text-white">$2,500.00</span>
                </div>
                <hr class="border-gray-800">
                <div class="flex justify-between items-center">
                    <span class="text-gray-400">رصيد الدينار</span>
                    <span id="dzd-balance" class="text-xl font-bold text-white">335,000.00 DA</span>
                </div>
            </div>
        </div>

        <div class="lg:col-span-2 space-y-6">
            <div class="glass-card rounded-2xl p-8">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <i class="fas fa-exchange-alt text-blue-400"></i> محول العملات السريع
                </h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-center">
                    <div class="space-y-2">
                        <label class="text-xs text-gray-500 mr-2">من</label>
                        <div class="bg-black/40 p-4 rounded-xl flex items-center border border-gray-800">
                            <input id="from-amount" type="number" placeholder="0.00" class="bg-transparent w-full outline-none text-xl font-bold">
                            <select id="from-currency" class="bg-transparent outline-none font-bold text-blue-400 cursor-pointer">
                                <option value="USD">USD</option>
                                <option value="DZD">DZD</option>
                            </select>
                        </div>
                    </div>

                    <div class="space-y-2 text-left md:text-right">
                        <label class="text-xs text-gray-500 ml-2">إلى (تقديري)</label>
                        <div class="bg-black/40 p-4 rounded-xl flex items-center border border-gray-800">
                            <input id="to-amount" type="text" readonly placeholder="0.00" class="bg-transparent w-full outline-none text-xl font-bold text-green-400">
                            <span id="target-label" class="font-bold text-gray-400">DZD</span>
                        </div>
                    </div>
                </div>

                <div class="mt-8">
                    <button onclick="processExchange()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all active:scale-95 flex justify-center items-center gap-3">
                        <i class="fas fa-bolt"></i> تنفيذ عملية التحويل فوراً
                    </button>
                    <p class="text-center text-[10px] text-gray-600 mt-4 italic text-right">* سعر الصرف الحالي: 1 USD = 134.50 DZD (محاكاة لحظية)</p>
                </div>
            </div>

            <div class="glass-card rounded-2xl p-6 overflow-hidden">
                <h3 class="text-sm font-bold text-gray-400 mb-4 uppercase tracking-widest">آخر العمليات</h3>
                <div id="history-list" class="space-y-4">
                    <div class="flex justify-between items-center text-sm opacity-60">
                        <div class="flex items-center gap-3">
                            <i class="fas fa-arrow-down text-green-500"></i>
                            <span>تحويل USD إلى DZD</span>
                        </div>
                        <span>+ 13,450.00 DA</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const rate = 134.50;
        let usdBalance = 2500.00;
        let dzdBalance = 335000.00;

        const fromInput = document.getElementById('from-amount');
        const toInput = document.getElementById('to-amount');
        const fromCurrency = document.getElementById('from-currency');
        const targetLabel = document.getElementById('target-label');

        fromInput.addEventListener('input', () => {
            const amount = parseFloat(fromInput.value) || 0;
            if(fromCurrency.value === 'USD') {
                toInput.value = (amount * rate).toLocaleString();
                targetLabel.innerText = 'DZD';
            } else {
                toInput.value = (amount / rate).toLocaleString();
                targetLabel.innerText = 'USD';
            }
        });

        fromCurrency.addEventListener('change', () => fromInput.dispatchEvent(new Event('input')));

        function processExchange() {
            const amount = parseFloat(fromInput.value) || 0;
            if(amount <= 0) return alert("يرجى إدخال مبلغ صحيح");

            if(fromCurrency.value === 'USD') {
                if(amount > usdBalance) return alert("رصيد USD غير كافٍ");
                usdBalance -= amount;
                dzdBalance += amount * rate;
            } else {
                if(amount > dzdBalance) return alert("رصيد DZD غير كافٍ");
                dzdBalance -= amount;
                usdBalance += amount / rate;
            }

            updateUI(amount);
        }

        function updateUI(amount) {
            document.getElementById('usd-balance').innerText = `$${usdBalance.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('dzd-balance').innerText = `${dzdBalance.toLocaleString(undefined, {minimumFractionDigits: 2})} DA`;
            
            const history = document.getElementById('history-list');
            const newEntry = document.createElement('div');
            newEntry.className = "flex justify-between items-center text-sm animate-pulse";
            newEntry.innerHTML = `
                <div class="flex items-center gap-3">
                    <i class="fas fa-check-circle text-blue-400"></i>
                    <span>تم التحويل بنجاح</span>
                </div>
                <span class="text-white">${amount} ${fromCurrency.value}</span>
            `;
            history.prepend(newEntry);
            fromInput.value = "";
            toInput.value = "";
        }
    </script>
</body>
</html>
